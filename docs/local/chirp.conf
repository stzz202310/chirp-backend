# sudo vim /etc/nginx/sites-available/chirp
# sudo nginx -t && sudo systemctl reload nginx

server {
    server_name chirp-app.dev www.chirp-app.dev;
    charset utf-8;
    client_max_body_size 6M;

    # Django admin 静态文件（python manage.py collectstatic 收集到容器内 /app/staticfiles）
    # 通过 Docker volume 映射到宿主机 /home/ubuntu/chirp/backend/chirp-backend/staticfiles/
    # 静态托管：Nginx 自己读文件返回
    location /django-static/ {
        alias /home/ubuntu/chirp/backend/chirp-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 请求 → Gunicorn
    # 反向代理：转发给 Gunicorn 处理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Django admin → Gunicorn
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端 React build（静态文件直接由 Nginx 托管; /static/ 也由这里处理，不单独配置）
    location / {
        root /home/ubuntu/chirp/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chirp-app.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chirp-app.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.chirp-app.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = chirp-app.dev) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name chirp-app.dev www.chirp-app.dev;
    return 404; # managed by Certbot
}