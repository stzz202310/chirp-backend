server {
    listen 80;
    server_name chirp-app.dev www.chirp-app.dev;
    charset utf-8;
    client_max_body_size 20M;

    # Django admin 静态文件（python manage.py collectstatic 收集到容器内 /app/staticfiles）
    # 通过 Docker volume 映射到宿主机 /var/lib/docker/volumes/chirp-backend_staticfiles/_data/
    location /django-static/ {
        alias /var/lib/docker/volumes/chirp-backend_staticfiles/_data/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API 请求 → Gunicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Django admin → Gunicorn
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端 React build（静态文件直接由 Nginx 托管; /static/ 也由这里处理，不单独配置）
    location / {
        root /home/ubuntu/chirp/frontend/build;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}